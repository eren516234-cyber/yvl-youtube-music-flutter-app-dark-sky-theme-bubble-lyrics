# Reduced from 8G — GitHub Actions runners have ~7GB RAM total; 8G causes OOM
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=false
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
android.enableJetifier=true
# Kotlin 2.x + many Flutter plugins have Java/Kotlin JVM target mismatch.
# Treat it as a warning (not an error) — standard fix for Flutter + Kotlin 2.x.
kotlin.jvm.target.validation.mode=warning
