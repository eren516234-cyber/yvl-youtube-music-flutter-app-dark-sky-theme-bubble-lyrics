name: Build YVL APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 17 (matches build.gradle.kts VERSION_17) ──────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ── NDK (pinned to match ndkVersion in app/build.gradle.kts) ───────────
      - name: Install NDK 27.0.12077973
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" || true

      # ── Accept all Android SDK licenses ────────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── Flutter stable (pinned for reproducibility) ─────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart version
        run: flutter --version

      # ── Pub cache ───────────────────────────────────────────────────────────
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      # ── Gradle cache ────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      # ── Code generation (Hive adapters etc.) ───────────────────────────────
      - name: Run code generation (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      # ── Static analysis (non-fatal) ─────────────────────────────────────────
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      # ── Release APK ─────────────────────────────────────────────────────────
      - name: Build Release APK
        run: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --split-debug-info=build/debug-info \
            --obfuscate

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: yvl-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── Debug APK (PRs only) ─────────────────────────────────────────────────
      - name: Build Debug APK
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload Debug APK
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: yvl-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
